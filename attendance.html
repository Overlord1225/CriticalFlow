<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biometric Attendance · ClinicalFlow</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="app-layout">
    <header id="sidebarContainer"></header>
    <main class="main-content">
      <header class="page-header">
        <h1><i class="fas fa-fingerprint" style="color:#1a7a7a;"></i> Biometric Attendance</h1>
        <div class="badge"><i class="fas fa-shield-alt"></i> GPS + Face Verification</div>
      </header>

      <section class="attendance-container" id="attendanceContainer">
        <div class="duty-card" id="dutyInfo">
          <h3 id="dutyTitle">Loading your duty...</h3>
          <p id="dutyDetails"></p>
          <div class="gps-status" id="gpsStatus"><i class="fas fa-map-pin"></i> GPS: <span id="gpsText">Waiting...</span></div>
          <div class="face-status" id="faceStatus"><i class="fas fa-user"></i> Face: <span id="faceText">Waiting...</span></div>
        </div>

        <div class="camera-wrapper" id="cameraWrapper">
          <video id="video" autoplay playsinline style="width:100%;"></video>
          <div class="camera-overlay" id="cameraOverlay"><i class="fas fa-camera"></i> Camera ready</div>
        </div>

        <div class="timer" id="timerDisplay">--:--</div>

        <div style="display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-top: 12px;">
          <button class="action-btn" id="timeInBtn"><i class="fas fa-sign-in-alt"></i> Time In</button>
          <button class="action-btn" id="timeOutBtn" disabled><i class="fas fa-sign-out-alt"></i> Time Out</button>
          <button class="action-btn secondary" id="refreshBtn"><i class="fas fa-sync"></i> Refresh</button>
        </div>

        <div id="attendanceLog" style="margin-top: 20px;"></div>
      </section>
    </main>
  </div>

  <!-- MediaPipe Face Mesh -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4/face_mesh.js" crossorigin="anonymous"></script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseclient.js" type="module"></script>
  <script src="js/utils.js" type="module"></script>
  <script src="js/data.js" type="module"></script>
  <script src="js/auth.js" type="module"></script>
  <script src="js/main.js" type="module"></script>
</body>
</html>
