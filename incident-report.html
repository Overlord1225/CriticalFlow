<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Incident Report · ClinicalFlow</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="app-layout">
    <header id="sidebarContainer"></header>
    <main class="main-content">
      <header class="page-header">
        <h1><i class="fas fa-exclamation-triangle" style="color:#b45309;"></i> Incident Report</h1>
        <div class="badge"><i class="fas fa-flag"></i> Submit an incident</div>
      </header>

      <section class="incident-form card-panel">
        <form id="incidentForm">
          <div class="form-group">
            <label for="incidentTitle">Title *</label>
            <input type="text" id="incidentTitle" required placeholder="Brief title of the incident">
          </div>
          <div class="form-group">
            <label for="incidentDescription">Description *</label>
            <textarea id="incidentDescription" rows="5" required placeholder="Describe the incident in detail..."></textarea>
          </div>
          <div class="form-group">
            <label for="incidentDate">Date of Incident *</label>
            <input type="date" id="incidentDate" required>
          </div>
          <div class="form-group">
            <label for="incidentLocation">Location (optional)</label>
            <input type="text" id="incidentLocation" placeholder="e.g., Hospital name or address">
          </div>
          <button type="submit" class="btn-primary">Submit Report</button>
        </form>
      </section>

      <section class="incident-history card-panel" id="incidentHistory">
        <h3>📋 Your Submitted Reports</h3>
        <div id="incidentList"></div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js" type="module"></script>
  <script src="js/utils.js" type="module"></script>
  <script src="js/data.js" type="module"></script>
  <script src="js/auth.js" type="module"></script>
  <script src="js/main.js" type="module"></script>
</body>
</html>
