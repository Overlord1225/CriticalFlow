<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CI Dashboard · ClinicalFlow</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="app-layout">
    <header id="sidebarContainer"></header>
    <main class="main-content">
      <header class="page-header">
        <h1>👩‍⚕️ CI Dashboard</h1>
        <div class="badge"><i class="fas fa-user-md"></i> <span id="ciName">Loading...</span></div>
      </header>

      <section class="table-wrap">
        <h3>📋 Assigned Students</h3>
        <table><thead><tr><th>Name</th><th>Program</th><th>Year</th><th>Status</th></tr></thead><tbody id="ciStudentsTable"></tbody></table>
      </section>

      <section class="table-wrap" style="margin-top:24px;">
        <h3>🏥 Assigned Hospital / Location</h3>
        <div id="ciLocation" class="status-message info">Loading assigned location...</div>
      </section>

      <section class="table-wrap" style="margin-top:24px;">
        <h3>🚨 Recent Incident Reports</h3>
        <div id="ciIncidentList" class="incident-list">
          <p>Loading incident reports...</p>
        </div>
      </section>

      <section class="table-wrap" style="margin-top:24px;">
        <h3>🩺 Manage Student Attendance</h3>
        <table>
          <thead>
            <tr>
              <th>Student</th>
              <th>Date</th>
              <th>Hospital</th>
              <th>Case</th>
              <th>Current Status</th>
              <th>Actions</th>
              <th>Reason</th>
            </tr>
          </thead>
          <tbody id="ciDutiesTable"></tbody>
        </table>
      </section>

      <section style="margin-top:32px; background:#fff; border-radius:20px; padding:24px; box-shadow: 0 2px 8px rgba(0,0,0,0.04);">
        <h3>📢 Send Announcement</h3>
        <form id="announcementForm">
          <textarea id="announcementMessage" rows="3" placeholder="Type your announcement here..." style="width:100%; padding:12px; border-radius:12px; border:1px solid #e9edf2; font-family:inherit;"></textarea>
          <button type="submit" class="btn-primary" style="margin-top:12px;">Broadcast to Students</button>
        </form>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js" type="module"></script>
  <script src="js/utils.js" type="module"></script>
  <script src="js/data.js" type="module"></script>
  <script src="js/auth.js" type="module"></script>
  <script src="js/main.js" type="module"></script>
</body>
</html>
