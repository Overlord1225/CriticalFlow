<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CI Dashboard · ClinicalFlow</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div class="app-layout">
  <div id="sidebarContainer"></div>
  <div class="main-content">
    <div class="page-header">
      <h1>👩‍⚕️ CI Dashboard</h1>
      <div class="badge"><i class="fas fa-user-md"></i> <span id="ciName">Loading...</span></div>
    </div>
    <div class="table-wrap">
      <h3 style="margin-bottom:12px;">📋 Assigned Students</h3>
      <table><thead><tr><th>Name</th><th>Program</th><th>Year</th><th>Status</th></tr></thead><tbody id="ciStudentsTable"></tbody></table>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabaseClient.js" type="module"></script>
<script src="js/data.js" type="module"></script>
<script src="js/auth.js" type="module"></script>
<script src="js/main.js" type="module"></script>
</body>
</html>
