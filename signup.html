<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClinicalFlow · Sign Up</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="logo"><i class="fas fa-heartbeat"></i> Clinical<span>Flow</span></div>
      <p class="sub">Smart Clinical Rotation Management</p>
      <h2>Create Account</h2>
      <div style="text-align:left; margin-bottom:16px;">
        <label>Email</label>
        <input type="email" id="signupEmail" placeholder="your@email.com" style="width:100%; padding:10px; border-radius:12px; border:1px solid #e9edf2; margin-top:4px;" />
        <label style="margin-top:12px; display:block;">Password</label>
        <input type="password" id="signupPassword" placeholder="••••••••" style="width:100%; padding:10px; border-radius:12px; border:1px solid #e9edf2; margin-top:4px;" />
        <label style="margin-top:12px; display:block;">Full Name</label>
        <input type="text" id="signupName" placeholder="Juan Dela Cruz" style="width:100%; padding:10px; border-radius:12px; border:1px solid #e9edf2; margin-top:4px;" />
      </div>
      <label style="display:block; text-align:left; margin-bottom:8px; font-weight:500;">Select Role</label>
      <div class="role-grid" style="margin-bottom:20px;">
        <button class="role-btn signup-role-btn" data-role="student"><i class="fas fa-user-graduate"></i> Student</button>
        <button class="role-btn signup-role-btn" data-role="scheduler"><i class="fas fa-calendar-alt"></i> Scheduler</button>
        <button class="role-btn signup-role-btn" data-role="ci"><i class="fas fa-user-md"></i> CI</button>
        <button class="role-btn signup-role-btn" data-role="admin"><i class="fas fa-user-tie"></i> Admin</button>
      </div>
      <div id="signupError" class="login-error" style="display:none;"></div>
      <button id="signupBtn" class="login-action-btn">Create Account <i class="fas fa-user-plus"></i></button>
      <p style="margin-top:16px; font-size:13px; color:#64748b;">
        Already have an account? <a href="index.html" style="color:#1a7a7a; font-weight:600;">Sign in</a>
      </p>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js" type="module"></script>
  <script src="js/utils.js" type="module"></script>
  <script src="js/data.js" type="module"></script>
  <script src="js/auth.js" type="module"></script>
  <script src="js/main.js" type="module"></script>
  <script type="module">
    import { signUp } from './js/data.js';

    let selectedRole = 'student';

    // Role selection
    document.querySelectorAll('.signup-role-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.signup-role-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedRole = btn.dataset.role;
      });
    });
    // Default select student
    document.querySelector('.signup-role-btn[data-role="student"]').classList.add('selected');

    // Sign-up
    document.getElementById('signupBtn').addEventListener('click', async () => {
      const email = document.getElementById('signupEmail').value;
      const password = document.getElementById('signupPassword').value;
      const name = document.getElementById('signupName').value;
      const errorEl = document.getElementById('signupError');

      if (!email || !password || !name) {
        errorEl.textContent = 'Please fill in all fields.';
        errorEl.style.display = 'block';
        return;
      }

      try {
        const user = await signUp(email, password, selectedRole, name, 'BSN');
        const map = {
          student: 'student-dashboard.html',
          scheduler: 'scheduler-dashboard.html',
          ci: 'ci-dashboard.html',
          admin: 'admin.html'
        };
        window.location.href = map[user.role];
      } catch (err) {
        console.error('Signup error:', err);
        errorEl.textContent = err.message || 'Failed to create account.';
        errorEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
