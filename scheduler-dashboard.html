<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scheduler Dashboard · ClinicalFlow</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="app-layout">
    <header id="sidebarContainer"></header>
    <main class="main-content">
      <header class="page-header">
        <h1>📊 Scheduler Dashboard</h1>
        <div class="badge"><i class="fas fa-user-cog"></i> <span id="schName">Coordinator</span></div>
      </header>

      <section class="card-grid">
        <div class="stat-card"><span class="stat-icon"><i class="fas fa-users"></i></span><div class="stat-num" id="statStudents">0</div><div class="stat-label">Total Students</div></div>
        <div class="stat-card"><span class="stat-icon"><i class="fas fa-door-open"></i></span><div class="stat-num" id="statSlots">0</div><div class="stat-label">Open Duty Slots</div></div>
        <div class="stat-card"><span class="stat-icon"><i class="fas fa-calendar"></i></span><div class="stat-num" id="statSched">0</div><div class="stat-label">Total Schedules</div></div>
        <div class="stat-card"><span class="stat-icon"><i class="fas fa-check-circle" style="color:#166534;"></i></span><div class="stat-num" id="statCompleted">0</div><div class="stat-label">Completed Duties</div></div>
      </section>

      <section class="table-wrap">
        <h3>📋 All Rotation Schedules</h3>
        <table><thead><tr><th>Student</th><th>Date</th><th>Hospital</th><th>Case</th><th>Status</th></tr></thead><tbody id="allSchedTable"></tbody></table>
      </section>

      <section>
        <h3>🔥 Rotation Heatmap</h3>
        <div id="heatmapContainer" class="table-wrap" style="padding:16px;"></div>
      </section>

      <section style="margin-top:32px; background:#fff; border-radius:20px; padding:24px; box-shadow: 0 2px 8px rgba(0,0,0,0.04);">
        <h3>📢 Send Announcement</h3>
        <form id="announcementForm">
          <textarea id="announcementMessage" rows="3" placeholder="Type your announcement here..." style="width:100%; padding:12px; border-radius:12px; border:1px solid #e9edf2; font-family:inherit;"></textarea>
          <button type="submit" class="btn-primary" style="margin-top:12px;">Broadcast to Students</button>
        </form>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js" type="module"></script>
  <script src="js/utils.js" type="module"></script>
  <script src="js/data.js" type="module"></script>
  <script src="js/auth.js" type="module"></script>
  <script src="js/main.js" type="module"></script>
</body>
</html>
