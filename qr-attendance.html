<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Face Attendance · ClinicalFlow</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
  <style>
    .face-scanner-container {
      background: #fff;
      border-radius: 28px;
      padding: 40px;
      max-width: 700px;
      margin: 0 auto;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.04);
      animation: fadeIn 0.4s ease-out;
    }
    .video-wrapper {
      position: relative;
      display: inline-block;
      margin: 20px 0;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    }
    #faceVideo {
      width: 100%;
      max-width: 640px;
      height: auto;
      display: block;
      background: #000;
    }
    #faceCanvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    .face-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 20px;
    }
    .face-btn {
      background: #1a7a7a;
      color: #fff;
      padding: 12px 32px;
      border-radius: 40px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all 0.25s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .face-btn:hover { background: #0f5f5f; transform: translateY(-2px); }
    .face-btn:disabled { background: #94a3b8; cursor: not-allowed; transform: none; }
    .face-btn.secondary { background: #64748b; }
    .face-btn.secondary:hover { background: #475569; }
    .recognized-list {
      margin-top: 24px;
      text-align: left;
    }
    .recognized-list h3 {
      font-size: 18px;
      margin-bottom: 12px;
      color: #0f172a;
    }
    .recognized-item {
      background: #f0fdf4;
      border-left: 4px solid #16a34a;
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .recognized-item.unverified {
      background: #fef9c3;
      border-left-color: #f59e0b;
    }
    .recognized-info {
      flex: 1;
    }
    .recognized-name {
      font-weight: 600;
      color: #0f172a;
      font-size: 15px;
    }
    .recognized-time {
      font-size: 12px;
      color: #64748b;
      margin-top: 2px;
    }
    .recognized-confidence {
      background: #16a34a;
      color: #fff;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .recognized-confidence.medium {
      background: #f59e0b;
    }
    .status-message {
      margin-top: 16px;
      padding: 12px;
      border-radius: 12px;
      font-weight: 500;
    }
    .status-message.success {
      background: #dcfce7;
      color: #166534;
    }
    .status-message.error {
      background: #fee2e2;
      color: #991b1b;
    }
    .status-message.info {
      background: #dbeafe;
      color: #075985;
    }
    .scanning-indicator {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #1a7a7a;
      font-weight: 500;
      margin-top: 12px;
    }
    .scanning-indicator .spinner {
      width: 20px;
      height: 20px;
      border: 3px solid #e9edf2;
      border-top-color: #1a7a7a;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
  </style>
</head>
<body>
<div class="app-layout">
  <div id="sidebarContainer"></div>
  <div class="main-content">
    <div class="page-header">
      <h1><i class="fas fa-camera" style="color:#1a7a7a;"></i> Face Recognition Attendance</h1>
      <div class="badge"><i class="fas fa-clock"></i> <span id="modeBadge">Student Mode</span></div>
    </div>

    <div id="faceScannerContainer" class="face-scanner-container">
      <!-- Content will be dynamically generated based on role -->
    </div>
  </div>
</div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js" type="module"></script>
<script src="js/utils.js" type="module"></script>
<script src="js/data.js" type="module"></script>
<script src="js/auth.js" type="module"></script>
<script src="js/faceRecognition.js" type="module"></script>
<script src="js/main.js" type="module"></script>
</body>
</html>
