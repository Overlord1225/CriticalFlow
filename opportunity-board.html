<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Opportunity Board · ClinicalFlow</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .opportunity-card {
      background: #fff;
      border-radius: 16px;
      padding: 16px 20px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-left: 4px solid #1a7a7a;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .claim-btn {
      background: #1a7a7a;
      color: #fff;
      border: none;
      padding: 8px 20px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .claim-btn:hover {
      background: #0f5f5f;
    }
    .claim-btn:disabled {
      background: #94a3b8;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
<div class="app-layout">
  <div id="sidebarContainer"></div>
  <div class="main-content">
    <div class="page-header">
      <h1><i class="fas fa-bullhorn" style="color:#1a7a7a;"></i> Opportunity Board</h1>
      <div class="badge">First‑come, first‑served</div>
    </div>
    <p style="margin-bottom:20px; color:#475569;">Claim available duty slots that match your remaining case requirements.</p>
    <div id="opportunityContainer"></div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabaseClient.js" type="module"></script>
<script src="js/utils.js" type="module"></script>
<script src="js/data.js" type="module"></script>
<script src="js/auth.js" type="module"></script>
<script src="js/main.js" type="module"></script>
</body>
</html>
